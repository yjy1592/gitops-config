apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../base
namespace: spring-boot-dev
images:
- name: nginx
  newName: jun1592/gitops-app
  newTag: sha-9d3d60c
patches:
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 1
  target:
    kind: Deployment
    name: gitops-app
