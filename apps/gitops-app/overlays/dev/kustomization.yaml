apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../base
namespace: gitops-app-dev
namePrefix: dev-
# commonLabels:
#   env: dev
labels:
  - pairs:
      app: gitops-app
      env: dev
    includeSelectors: true
    includeTemplates: true
images:
  - name: gitops-app
    newName: jun1592/gitops-app
    newTag: latest
replicas:
  - name: gitops-app
    count: 1
